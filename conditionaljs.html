<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional statement</title>
</head>
<body>
    <script>
        let age = 18;
        if(age >= 18){
            console.log("You are eligible for vote!");
        }

        //if else statement
        let myAge = 18;
        if(myAge >= 18){
            console.log("Can drive a car or bike ");
        }
        else{
            console.log("Cannot drive a car");
        }

        //switch case statement
        let grade = "B";
        switch(grade){
            case 'A': result= "first division";
            break;
            case 'B': result= "second division";
            break;
            case 'C': result= "third division";
            break;
            case 'D' : result= "pass";
            break;
            default: result= "fail";
        }
        console.log(result);

        //if else if statement
        let marks = 50;
        if (marks>=90){
            console.log("Grade A");
        }
        else if(marks<=89&&marks>=80){
            console.log("Grade B");
        }
        else if(marks<=79&&marks>=70){
            console.log("Grade C");
        }
        else if(marks<=69&&marks>=60){
            console.log("Grade D");
        }
        else{
            console.log("Grade average");
        }


//program to find grade of students using if else if statement
        let num = [50, 60, 70, 80, 90];
        for(let i=0; i<num.length; i++){
            if(num[i]>=90){
                console.log("Grade A");
            }
            else if(num[i]<=89&&num[i]>=80){
                console.log("Grade B");
            }
            else if(num[i]<=79&&num[i]>=70){
                console.log("Grade C");
            }
            else if(num[i]<=69&&num[i]>=60){
                console.log("Grade D");
            }
            else{
                console.log("Grade average");
            }
        }    
    </script>
    
</body>
</html>
